name: E2E Tests

permissions:
    contents: read

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        paths-ignore:
            - '**/*.md'
            - 'docs/**'

jobs:
    build:
        name: Build Application and UI
        runs-on: ubuntu-latest

        services:
            mailhog:
                image: mailhog/mailhog
                ports:
                    - 1025:1025
                    - 8025:8025

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.23.4'
                  cache: true

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Build UI
              run: |
                  cd web
                  bun install
                  export API_URL="/api"
                  bun run build

            - name: Install dependencies
              run: |
                  go mod download
                  sudo apt-get update
                  sudo apt-get install -y build-essential
            - name: Cache Go modules
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-

            - name: Cache built binary
              id: cache-binary
              uses: actions/cache@v4
              with:
                  path: chainlaunch
                  key: ${{ runner.os }}-chainlaunch-bin-${{ hashFiles('**/*.go', '**/go.sum', '**/go.mod') }}

            - name: Build the application
              if: steps.cache-binary.outputs.cache-hit != 'true'
              run: |
                  go build -v -o chainlaunch ./main.go
                  chmod +x chainlaunch

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-artifacts
                  path: |
                      chainlaunch
                      web/dist

    testnet-besu:
        name: Create Besu Testnet
        runs-on: ubuntu-latest
        needs: build
        env:
            CHAINLAUNCH_USER: admin
            CHAINLAUNCH_PASSWORD: admin123
            CHAINLAUNCH_DATA: ${{ github.workspace }}/test-data
            CHAINLAUNCH_API_URL: http://localhost:8100/api/v1
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '21'
                  
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts

            - name: Start the application and verify API is available
              run: |
                  echo "CHAINLAUNCH_DATA: $CHAINLAUNCH_DATA"
                  chmod +x chainlaunch
                  ./chainlaunch serve --data=$CHAINLAUNCH_DATA --port=8100 --db data.db &
                  # Wait for port 8100 to be available (60 seconds timeout)
                  timeout=60
                  while ! curl -s http://localhost:8100 > /dev/null; do
                    if [ $timeout -le 0 ]; then
                      echo "Timeout waiting for API to become available"
                      exit 1
                    fi
                    echo "Waiting for API to become available... ($timeout seconds remaining)"
                    sleep 1
                    timeout=$((timeout - 1))
                  done
            - name: Create and verify Besu testnet
              run: |
                  # Create a new Besu testnet
                  ./chainlaunch testnet besu --name mynet --nodes 4 --prefix besu-test --mode=docker
                  # Wait for port 8545 to be available (60 seconds timeout)
                  timeout=60
                  while ! curl -s http://localhost:8545 > /dev/null; do
                    if [ $timeout -le 0 ]; then
                      echo "Timeout waiting for Besu node to become available"
                      exit 1
                    fi
                    echo "Waiting for Besu node to become available... ($timeout seconds remaining)"
                    sleep 1
                    timeout=$((timeout - 1))
                  done

                  # Wait for nodes to start producing blocks (up to 90 seconds)
                  for i in {1..90}; do
                    # Make the curl request and capture both stdout and stderr
                    if ! resp=$(curl -s -f -X POST --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' http://localhost:8545 2>&1); then
                      curl_status=$?
                      case $curl_status in
                        56)
                          echo "Connection refused to node (status: $curl_status). Retrying..."
                          ;;
                        7)
                          echo "Failed to connect to host (status: $curl_status). Retrying..."
                          ;;
                        28)
                          echo "Operation timed out (status: $curl_status). Retrying..."
                          ;;
                        22)
                          echo "HTTP response code indicated error (status: $curl_status). Retrying..."
                          ;;
                        *)
                          echo "Curl failed with status $curl_status: $resp. Retrying..."
                          ;;
                      esac
                      sleep 1
                      continue
                    fi

                    # Check for empty response
                    if [ -z "$resp" ]; then
                      echo "Empty response received from node"
                      sleep 1
                      continue
                    fi

                    # Parse the response with error handling
                    if ! block_hex=$(echo "$resp" | jq -r .result 2>/dev/null); then
                      echo "Failed to parse JSON response: $resp"
                      sleep 1
                      continue
                    fi

                    # Check for JSON-RPC errors
                    if error=$(echo "$resp" | jq -r .error 2>/dev/null) && [ "$error" != "null" ]; then
                      echo "JSON-RPC error received: $error"
                      sleep 1
                      continue
                    fi

                    if [ "$block_hex" = "null" ] || [ -z "$block_hex" ]; then
                      echo "Invalid block number received"
                      sleep 1
                      continue
                    fi

                    # Validate hex format
                    if [[ ! "$block_hex" =~ ^0x[0-9a-fA-F]+$ ]]; then
                      echo "Invalid hex format received: $block_hex"
                      sleep 1
                      continue
                    fi

                    # Convert hex to decimal with error handling
                    if ! block_num=$((16#${block_hex:2})) 2>/dev/null; then
                      echo "Failed to convert block number from hex: $block_hex"
                      sleep 1
                      continue
                    fi

                    echo "Current block: $block_num"
                    if [ "$block_num" -ge 5 ]; then
                      echo "Besu node has reached block >= 5"
                      exit 0
                    fi
                    sleep 1
                  done

                  echo "Timeout waiting for blocks to be produced"
                  exit 1
            - name: Show Besu containers and logs (always)
              if: always()
              run: |
                  echo "==== besu list nodes ===="
                  ./chainlaunch besu list
                  echo "==== docker ps ===="
                  docker ps -a || true
                  echo "==== docker logs (besu containers) ===="
                  for cid in $(docker ps -a --filter "name=besu-test" --format "{{.ID}}" ); do
                    echo "--- Logs for container $cid ---"
                    docker logs $cid || true
                  done

    testnet-fabric:
        name: Create Fabric Testnet
        runs-on: ubuntu-latest
        needs: build
        env:
          CHAINLAUNCH_USER: admin
          CHAINLAUNCH_PASSWORD: admin123
          CHAINLAUNCH_DATA: ${{ github.workspace }}/test-data
          CHAINLAUNCH_API_URL: http://localhost:8100/api/v1
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
            - name: Start the application and verify API is available
              run: |
                  echo "CHAINLAUNCH_DATA: $CHAINLAUNCH_DATA"
                  chmod +x chainlaunch
                  ./chainlaunch serve --data=$CHAINLAUNCH_DATA --port=8100 --db data.db &
                  # Wait for port 8100 to be available (60 seconds timeout)
                  timeout=60
                  while ! curl -s http://localhost:8100 > /dev/null; do
                    if [ $timeout -le 0 ]; then
                      echo "Timeout waiting for API to become available"
                      exit 1
                    fi
                    echo "Waiting for API to become available... ($timeout seconds remaining)"
                    sleep 1
                    timeout=$((timeout - 1))
                  done

            - name: Create Fabric testnet
              run: |
                  ./chainlaunch testnet fabric --name mynet --org "Org1MSP123" --peerOrgs "Org1MSP123" --ordererOrgs "OrdererOrg123" --channels mychannel --peerCounts "Org1MSP123=2" --ordererCounts "OrdererOrg123=3" --mode=docker
            - name: Test get a block from the channel
              run: |
                  export NETWORK_ID=$(./chainlaunch networks fabric list --output=json | jq -r '.networks[0].id')
                  response=$(curl -s -w "%{http_code}" -X 'GET' \
                    "http://localhost:8100/api/v1/networks/fabric/$NETWORK_ID/blocks/0" \
                    -H 'accept: application/json' \
                    -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD")
                  status_code=${response: -3}
                  response_body=${response:0:-3}
                  if [ "$status_code" -ne 200 ]; then
                    echo "Error: Expected status code 200, got $status_code"
                    echo "Response body: $response_body"
                    exit 1
                  fi
                  echo "Got a block from the channel with status code 200"
            - name: Show Fabric containers and logs (debug)
              if: always()
              run: |
                  echo "==== list fabric networks ===="
                  ./chainlaunch networks fabric list --output=json
                  echo "==== list fabric peers ===="
                  ./chainlaunch fabric peer list --output=json
                  echo "==== list fabric orderers ===="
                  ./chainlaunch fabric orderer list --output=json
                  echo "==== docker ps ===="
                  docker ps -a || true
                  echo "==== docker logs (fabric containers) ===="
                  for cid in $(docker ps -a --filter "name=fabric" --format "{{.ID}}" ); do
                    echo "--- Logs for container $cid ---"
                    docker logs $cid || true
                  done

    testnet-fabricx:
        name: Create FabricX Testnet
        runs-on: ubuntu-latest
        needs: build
        env:
            CHAINLAUNCH_USER: admin
            CHAINLAUNCH_PASSWORD: admin123
            CHAINLAUNCH_DATA: ${{ github.workspace }}/test-data
            CHAINLAUNCH_API_URL: http://localhost:8100/api/v1
            # Force the FabricX runtime to add host.docker.internal:host-gateway
            # extra-hosts and rewrite 127.0.0.1 → host.docker.internal in
            # container configs. Docker on Linux runners doesn't auto-publish
            # this name, so without it the inter-party gRPC dials fail.
            CHAINLAUNCH_FABRICX_LOCAL_DEV: 'true'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
            - name: Pre-pull FabricX docker images
              # Pulled up-front so the (substantial) image fetch isn't
              # accounted to the per-node 3-minute HTTP-timeout budget the
              # quickstart enforces around /nodes/{id}/start.
              run: |
                  docker pull ghcr.io/hyperledger/fabric-x-orderer:1.0.0-alpha
                  docker pull ghcr.io/hyperledger/fabric-x-committer:1.0.0-alpha
                  docker pull postgres:16-alpine
            - name: Map host.docker.internal on the runner host
              # The FabricX runtime rewrites postgres host (and inter-container
              # endpoints) to host.docker.internal in local-dev mode and
              # adds <ExternalIP>:host-gateway as a docker extra-host. With
              # --external-ip host.docker.internal everything inside the
              # docker network resolves correctly via the host-gateway map.
              # But the chainlaunch *server* runs on the host, not in a
              # container, and Linux Docker doesn't auto-publish that name
              # on the host like Docker Desktop does on macOS. Add a
              # /etc/hosts entry so the server's namespace-create dial can
              # also reach host.docker.internal.
              run: |
                  echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts
                  getent hosts host.docker.internal
            - name: Start the application and verify API is available
              run: |
                  echo "CHAINLAUNCH_DATA: $CHAINLAUNCH_DATA"
                  chmod +x chainlaunch
                  ./chainlaunch serve --data=$CHAINLAUNCH_DATA --port=8100 --db data.db &
                  # Wait for port 8100 to be available (60 seconds timeout)
                  timeout=60
                  while ! curl -s http://localhost:8100 > /dev/null; do
                    if [ $timeout -le 0 ]; then
                      echo "Timeout waiting for API to become available"
                      exit 1
                    fi
                    echo "Waiting for API to become available... ($timeout seconds remaining)"
                    sleep 1
                    timeout=$((timeout - 1))
                  done
            - name: Provision FabricX 4-party single-MSP network
              # quickstart provisions the full 4-party Arma BFT network end
              # to end (orgs, postgres, 4 orderer-groups + their child join,
              # 1 committer + its 5-container start, post-join reconcile).
              # Non-zero exit on any phase failure. The built-in namespace
              # check is skipped here (--namespace "") because the committer
              # sidecar takes a few extra seconds beyond container "Up" to
              # become reachable on its gRPC port — covered by the next
              # step's retry loop.
              run: |
                  ./chainlaunch fabricx quickstart \
                    --network-name e2e-fabricx \
                    --single-msp E2eMSP \
                    --base-port 17000 \
                    --postgres-port 15432 \
                    --external-ip host.docker.internal \
                    --namespace "" \
                    --http-timeout 4m
            - name: Wait for committer sidecar gRPC to be reachable
              # The committer sidecar (host port 17010) is started last and
              # has to discover the four other committer subroles
              # (coordinator, validator, verifier, query-service) over the
              # internal docker network before it accepts gRPC. A simple
              # nc port-probe confirms it's accepting TCP — the namespace
              # POST below is the real gRPC liveness check.
              run: |
                  for i in $(seq 1 60); do
                    if nc -z 127.0.0.1 17010 2>/dev/null; then
                      echo "Committer sidecar reachable on :17010 after ${i}s"
                      exit 0
                    fi
                    sleep 1
                  done
                  echo "Committer sidecar never came up on :17010"
                  exit 1
            - name: Create namespace via API and verify finality
              # Dedicated namespace step with its own retry — the gRPC dial
              # to the sidecar can still race the listener's acceptance of
              # the first client even after the TCP probe succeeds. Mirrors
              # the body the CLI's --namespace flag sends:
              # {name, submitterOrgId, waitForFinality, finalityTimeoutSeconds}.
              run: |
                  net_id=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/networks/fabricx?limit=20" \
                    | jq -r '.networks[] | select(.name=="e2e-fabricx") | .id')
                  org_id=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/organizations?limit=200" \
                    | jq -r '.items[] | select(.mspId=="E2eMSP") | .id' | head -1)
                  if [ -z "$net_id" ] || [ -z "$org_id" ]; then
                    echo "Failed to resolve net_id=$net_id or org_id=$org_id"
                    exit 1
                  fi
                  echo "Creating namespace 'e2etest' on network #$net_id (submitter org #$org_id)"
                  body=$(jq -n --argjson o "$org_id" \
                    '{name:"e2etest",submitterOrgId:$o,waitForFinality:true,finalityTimeoutSeconds:90}')
                  for i in $(seq 1 5); do
                    code=$(curl -s -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                      -H 'Content-Type: application/json' \
                      -o /tmp/ns-resp.json -w '%{http_code}' \
                      -X POST "$CHAINLAUNCH_API_URL/networks/fabricx/$net_id/namespaces" \
                      -d "$body" || echo "000")
                    if [ "$code" = "200" ] || [ "$code" = "201" ]; then
                      echo "Namespace 'e2etest' committed (attempt $i)"
                      jq . /tmp/ns-resp.json 2>/dev/null || cat /tmp/ns-resp.json
                      exit 0
                    fi
                    echo "Namespace create attempt $i returned HTTP $code:"
                    cat /tmp/ns-resp.json || true
                    echo
                    sleep 10
                  done
                  echo "Namespace creation never succeeded after 5 retries"
                  exit 1
            - name: Verify FabricX network is queryable via API
              # Once every node joins, the deployer kicks off a background
              # verification (see VerifyNetwork). It can race the orderer
              # router becoming reachable in CI, so the network may already
              # be in "verification_failed" by the time we inspect it — even
              # though the prior namespace-create step proved the network
              # works. Re-run verification synchronously to settle the state,
              # then accept any of: genesis_block_created (auto-verify never
              # fired), running (verify succeeded), or genesis_block_created
              # again after a successful re-verify.
              run: |
                  net_id=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/networks/fabricx?limit=20" \
                    | jq -r '.networks[] | select(.name=="e2e-fabricx") | .id')
                  if [ -z "$net_id" ]; then
                    echo "Could not locate provisioned FabricX network in API listing"
                    exit 1
                  fi
                  echo "FabricX network id: $net_id"
                  status=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/networks/fabricx/$net_id" \
                    | jq -r '.status')
                  echo "FabricX network status (initial): $status"
                  if [ "$status" = "verification_failed" ]; then
                    echo "Re-running verification synchronously after the namespace test proved the network works"
                    code=$(curl -s -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                      -H 'Accept: application/json' \
                      -o /tmp/verify-resp.json -w '%{http_code}' \
                      -X POST "$CHAINLAUNCH_API_URL/networks/fabricx/$net_id/verify")
                    echo "Re-verify HTTP $code:"
                    cat /tmp/verify-resp.json 2>/dev/null || true
                    echo
                    status=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                      -H 'Accept: application/json' \
                      "$CHAINLAUNCH_API_URL/networks/fabricx/$net_id" \
                      | jq -r '.status')
                    echo "FabricX network status (after re-verify): $status"
                  fi
                  case "$status" in
                    running|genesis_block_created)
                      ;;
                    *)
                      echo "Expected status running or genesis_block_created, got $status"
                      exit 1
                      ;;
                  esac
            - name: Verify all FabricX nodes are RUNNING
              # 17 nodes/network in single-MSP mode (4 orderer-groups × 4
              # children + 1 committer). Anything not RUNNING means the
              # join+start phase silently dropped a node despite the
              # namespace check passing.
              run: |
                  not_running=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/nodes?platform=FABRICX&limit=200" \
                    | jq -r '.items[] | select(.status != null) | "\(.name)\t\(.status)"' \
                    | grep -v 'RUNNING' || true)
                  if [ -n "$not_running" ]; then
                    echo "Some FabricX nodes are not RUNNING:"
                    echo "$not_running"
                    exit 1
                  fi
                  count=$(curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/nodes?platform=FABRICX&limit=200" \
                    | jq -r '.items | length')
                  echo "FabricX node count: $count"
                  if [ "$count" -lt 17 ]; then
                    echo "Expected at least 17 FabricX nodes, got $count"
                    exit 1
                  fi
            - name: Show FabricX containers and logs (debug)
              if: always()
              run: |
                  echo "==== docker ps ===="
                  docker ps -a || true
                  echo "==== docker logs (fabricx-* containers) ===="
                  for cid in $(docker ps -a --filter "name=fabricx-" --format "{{.ID}}" ); do
                    name=$(docker inspect --format '{{.Name}}' "$cid" 2>/dev/null | sed 's@^/@@')
                    echo "--- Logs for $name ($cid) ---"
                    docker logs --tail 200 "$cid" 2>&1 || true
                  done
                  echo "==== chainlaunch FABRICX nodes ===="
                  curl -sf -u "$CHAINLAUNCH_USER:$CHAINLAUNCH_PASSWORD" \
                    -H 'Accept: application/json' \
                    "$CHAINLAUNCH_API_URL/nodes?platform=FABRICX&limit=200" \
                    | jq '.items[] | {id,name,status,endpoint}' || true

    api-e2e:
        name: Run API E2E Tests
        runs-on: ubuntu-latest
        needs: [build]

        services:
            mailhog:
                image: mailhog/mailhog
                ports:
                    - 1025:1025
                    - 8025:8025

        env:
            API_BASE_URL: http://localhost:8100/api/v1
            CHAINLAUNCH_USER: admin
            CHAINLAUNCH_PASSWORD: admin123
            API_USERNAME: admin
            API_PASSWORD: admin123

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts

            - name: Start the application and run API tests
              run: |
                  export CHAINLAUNCH_USER=admin
                  export CHAINLAUNCH_PASSWORD=admin123
                  export CHAINLAUNCH_DATA=${{ github.workspace }}/test-data
                  echo "CHAINLAUNCH_DATA: $CHAINLAUNCH_DATA"
                  chmod +x chainlaunch
                  ./chainlaunch serve --data=$CHAINLAUNCH_DATA --port=8100 --db data.db &
                  # Wait for port 8100 to be available (60 seconds timeout)
                  timeout=60
                  while ! curl -s http://localhost:8100 > /dev/null; do
                    if [ $timeout -le 0 ]; then
                      echo "Timeout waiting for API to become available"
                      exit 1
                    fi
                    echo "Waiting for API to become available... ($timeout seconds remaining)"
                    sleep 1
                    timeout=$((timeout - 1))
                  done

            - name: Upload API test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: api-test-results
                  path: test-results.xml

    ui-e2e:
        name: Run UI E2E Tests
        runs-on: ubuntu-latest
        needs: build

        services:
            mailhog:
                image: mailhog/mailhog
                ports:
                    - 1025:1025
                    - 8025:8025

        env:
            CYPRESS_BASE_URL: http://localhost:8100
            CYPRESS_API_URL: http://localhost:8100/api/v1
            PLAYWRIGHT_USER: admin
            PLAYWRIGHT_PASSWORD: admin123
            CHAINLAUNCH_USER: admin
            CHAINLAUNCH_PASSWORD: admin123
            PLAYWRIGHT_BASE_URL: http://localhost:8100

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: build-artifacts
            - name: Cache Playwright Browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-browsers-${{ runner.os }}-${{ hashFiles('web/package.json', 'web/bun.lockb') }}
                  restore-keys: |
                      playwright-browsers-${{ runner.os }}-

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
            - name: Build UI
              run: |
                  cd web
                  bun install

            - name: Install Playwright Browsers
              run: |
                  cd web
                  bunx playwright install --with-deps

            - name: Start server and run UI tests
              run: |
                  export CHAINLAUNCH_DATA=${{ github.workspace }}/test-data
                  chmod +x chainlaunch
                  ./chainlaunch serve --data=$CHAINLAUNCH_DATA --port=8100 --db data.db &

                  # Wait for port 8100 to be available (60 seconds timeout)
                  timeout=60
                  while ! curl -s http://localhost:8100 > /dev/null; do
                    if [ $timeout -le 0 ]; then
                      echo "Timeout waiting for API to become available"
                      exit 1
                    fi
                    echo "Waiting for API to become available... ($timeout seconds remaining)"
                    sleep 1
                    timeout=$((timeout - 1))
                  done

                  cd web
                  bun run test:e2e

            - name: Upload UI test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: ui-test-results
                  path: |
                      web/test-results
